services:
  traefik:
    image: traefik:v3.6.8
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - '80:80'
      - '8081:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    build:
      context: .
      target: development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_UNDER_CONSTRUCTION=true
    labels:
      - traefik.enable=true
      - traefik.http.routers.resumee.rule=Host(`resumee.localhost`)
      - traefik.http.routers.resumee.entrypoints=web
      - traefik.http.services.resumee.loadbalancer.server.port=5173

volumes:
  node_modules:
