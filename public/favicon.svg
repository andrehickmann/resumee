<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1a1a1a"/>
  <text x="50" y="70" font-family="Space Grotesk, sans-serif" font-size="60" font-weight="700" fill="#f97316" text-anchor="middle">
    A
    <animate attributeName="opacity" values="1;0;0;0;1" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="50" y="70" font-family="Space Grotesk, sans-serif" font-size="60" font-weight="700" fill="#f97316" text-anchor="middle">
    H
    <animate attributeName="opacity" values="0;1;0;0;0" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="50" y="70" font-family="Space Grotesk, sans-serif" font-size="60" font-weight="700" fill="#f97316" text-anchor="middle">
    K
    <animate attributeName="opacity" values="0;0;1;0;0" dur="5s" repeatCount="indefinite"/>
  </text>
</svg>
