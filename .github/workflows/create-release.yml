name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select the semantic version bump for the release.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: create-release-master
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs from master
        if: github.ref_name != 'master'
        run: |
          echo "This workflow must be started from the master branch."
          exit 1

      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Bump package version
        id: version
        run: |
          npm version "${{ inputs.release_type }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify release candidate
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Create Git tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:master
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target master \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
