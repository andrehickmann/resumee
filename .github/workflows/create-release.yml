name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select the semantic version bump for the release.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: create-release-master
  cancel-in-progress: false

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs from master
        if: github.ref_name != 'master'
        run: |
          echo "This workflow must be started from the master branch."
          exit 1

      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Bump package version
        id: version
        run: |
          npm version "${{ inputs.release_type }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          BRANCH="release/${TAG}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Verify release candidate
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create release branch commit
        run: |
          git checkout -B "${{ steps.version.outputs.branch }}"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Push release branch
        run: |
          git fetch origin "${{ steps.version.outputs.branch }}" || true
          git push --force-with-lease origin "${{ steps.version.outputs.branch }}"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL="$(gh pr list \
            --head "${{ steps.version.outputs.branch }}" \
            --base master \
            --state open \
            --json url \
            --jq '.[0].url')"
          if [ -n "$PR_URL" ]; then
            echo "Release pull request already exists: $PR_URL"
            exit 0
          fi
          gh pr create \
            --base master \
            --head "${{ steps.version.outputs.branch }}" \
            --title "chore: release ${{ steps.version.outputs.tag }}" \
            --body "Automated release PR for ${{ steps.version.outputs.tag }}. Merge this PR to publish the GitHub release and trigger deployment."
