name: Preview Deploy (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_NAME: resumee-pr-${{ github.event.pull_request.number }}
        run: |
          npx wrangler deploy --name "$PREVIEW_NAME"
          echo "preview_name=$PREVIEW_NAME" >> "$GITHUB_OUTPUT"
        id: deploy

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewName = '${{ steps.deploy.outputs.preview_name }}';
            const url = `https://${previewName}.workers.dev`;
            const body = `✅ Preview deploy ready: ${url}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
