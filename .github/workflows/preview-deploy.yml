name: Preview Deploy (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_NAME: resumee-pr-${{ github.event.pull_request.number }}
        run: |
          npx wrangler deploy --name "$PREVIEW_NAME"
          echo "preview_name=$PREVIEW_NAME" >> "$GITHUB_OUTPUT"
        id: deploy

      - name: Skip preview deploy
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: echo "Cloudflare preview secrets are not available; skipping preview deploy."

      - name: Comment preview URL
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const previewName = '${{ steps.deploy.outputs.preview_name }}';
            const url = `https://${previewName}.andre-hickmann-ger.workers.dev`;
            const body = `✅ Preview deploy ready: ${url}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
