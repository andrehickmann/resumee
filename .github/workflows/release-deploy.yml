name: Release Deploy (Cloudflare)

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          ACTUAL_TAG="${{ github.event.release.tag_name }}"
          if [ "$EXPECTED_TAG" != "$ACTUAL_TAG" ]; then
            echo "Release tag $ACTUAL_TAG does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
