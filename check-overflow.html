<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow Check</title>
    <link rel="stylesheet" href="dist/assets/main-D8qAExOZ.css">
    <style>
        body { border: 2px solid red; }
        * { outline: 1px solid rgba(255, 0, 0, 0.1); }
        .overflow-indicator {
            position: fixed;
            top: 0;
            right: 0;
            background: red;
            color: white;
            padding: 10px;
            z-index: 9999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="overflow-indicator">
        <div>Viewport: <span id="vw"></span>px</div>
        <div>Body width: <span id="bw"></span>px</div>
        <div>Scroll width: <span id="sw"></span>px</div>
        <div>Overflow: <span id="overflow"></span></div>
    </div>
    <script>
        function check() {
            document.getElementById('vw').textContent = window.innerWidth;
            document.getElementById('bw').textContent = document.body.offsetWidth;
            document.getElementById('sw').textContent = document.body.scrollWidth;
            const overflow = document.body.scrollWidth > window.innerWidth;
            document.getElementById('overflow').textContent = overflow ? 'YES ❌' : 'NO ✅';
            document.querySelector('.overflow-indicator').style.background = overflow ? 'red' : 'green';
        }
        check();
        window.addEventListener('resize', check);
    </script>
</body>
</html>
